- defaults:
    link:
      create: true
      relink: true
      force: true
    shell:
      stdin: true
      stdout: true
      stderr: true

- clean:
    "~":
      force: true
    "~/.config":
      force: true
    "~/.config/nvim":
      force: true
    "~/.config/alacritty":
      force: true

- link:
    "~/.gitignore_global": "global_gitignore"
    "~/.config/ghostty/config": "ghostty_config"
    "~/.config/nvim":
      path: "nvim"
    "~/.config/starship.toml": "starship.toml"
    "~/.config/fish/config.fish": "fish_config.fish"
    "~/.config/fish/fish_plugins": "fish_plugins"
    "~/.config/mise/config.toml": "mise_config.toml"
    "~/.config/opencode/opencode.json": "opencode/opencode.json"
    "~/.config/opencode/oh-my-opencode.json": "opencode/oh-my-opencode.json"
    "~/.config/opencode/AGENTS.md": "opencode/AGENTS.md"
    "~/.config/opencode/commands":
      path: "opencode/commands"
    "~/.config/fish/functions/":
      glob: true
      path: "fish_functions/*.fish"

- shell:
    # Require Full Disk Access for terminal used to run this script
    - command: sh macos/apply.sh
      description: Apply macOS defaults

    - command: cp global_gitconfig ~/.gitconfig
      description: Copy git config

    - command: sh scripts/setup_git_local.sh
      description: Setup local git signing key

    - command: '/bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" || true'
      description: Bootstrap Homebrew if not present

    - command: brew bundle --file=Brewfile
      description: Install all Homebrew packages

    - command: sh scripts/setup_ssh_agent.sh
      description: Setup Homebrew SSH agent with FIDO2 support

    - command: mise install
      description: Install language runtimes via mise

    - command: 'fish -c "curl -sL https://raw.githubusercontent.com/jorgebucaran/fisher/main/functions/fisher.fish | source && fisher install jorgebucaran/fisher" || true'
      description: Bootstrap Fisher

    - command: 'fish -c "fisher update"'
      description: Install fish plugins from fish_plugins

    - command: sh init_gcloud.sh
      description: Initialize Google Cloud SDK

    - command: git submodule sync --recursive
      description: Sync git submodules

